version: "3.9"

services:
  # ── Neo4j Graph DB ──────────────────────────────────────────
  neo4j:
    image: neo4j:5.18-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-secret}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
      NEO4J_dbms_memory_pagecache_size: 512m
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Redis (Session cache + Semantic cache) ───────────────────
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── Embedding Service (FastAPI) — B1.2 ───────────────────────
  embedding:
    build:
      context: ./services/embedding
      dockerfile: Dockerfile
    container_name: embedding
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MODEL_NAME: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Reranker Service (FastAPI) — B1.2 ────────────────────────
  reranker:
    build:
      context: ./services/reranker
      dockerfile: Dockerfile
    container_name: reranker
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      MODEL_NAME: ${RERANKER_MODEL:-BAAI/bge-reranker-v2-m3}
      DEVICE: cpu
    volumes:
      - model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ── Data Ingestion Pipeline — B1.3 ───────────────────────────
  ingestion:
    build:
      context: ./services/ingestion
      dockerfile: Dockerfile
    container_name: ingestion
    restart: unless-stopped
    ports:
      - "8003:8003"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-secret}
      EMBEDDING_URL: http://embedding:8001
      LLM_URL: http://llm_serving:8000
      WATCH_DIR: /data/watch
    volumes:
      - ./data:/data
    depends_on:
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy

  # ── Graph RAG API — B1.1 + B1.2 ─────────────────────────────
  graph_rag:
    build:
      context: ./services/graph_rag
      dockerfile: Dockerfile
    container_name: graph_rag
    restart: unless-stopped
    ports:
      - "8004:8004"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-secret}
      EMBEDDING_URL: http://embedding:8001
      RERANKER_URL: http://reranker:8002
      REDIS_URL: redis://redis:6379
      RERANK_THRESHOLD: "0.001"
      SEMANTIC_CACHE_THRESHOLD: "0.95"
    depends_on:
      neo4j:
        condition: service_healthy
      embedding:
        condition: service_healthy
      reranker:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=5)"]
      interval: 10s
      retries: 5

  # ── SGLang Generator (Qwen2.5-7B-AWQ) — B2.1 ───────────────────
  # Yêu cầu: GPU RTX 3060+ với nvidia-container-toolkit đã cài.
  # Mô hình tải lần đầu từ Hugging Face (~7 GB) vào model_cache volume.
  # Để bỏ qua GPU và dùng mock LLM: đặt GENERATOR_URL=http://llm_serving:8000/mock/v1
  sglang:
    image: lmsysorg/sglang:v0.4.6-cu124
    container_name: sglang
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      HF_HOME: /root/.cache/huggingface
    volumes:
      - model_cache:/root/.cache/huggingface
    command: >
      python -m sglang.launch_server
      --model-path ${GENERATOR_MODEL:-Qwen/Qwen2.5-7B-Instruct-AWQ}
      --port 8081
      --host 0.0.0.0
      --mem-fraction-static 0.78
      --context-length 4096
      --quantization awq
      --dtype half
      --schedule-policy lpm
      --chunked-prefill-size 2048
      --max-running-requests 8
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health', timeout=5)"]
      interval: 30s
      timeout: 15s
      retries: 20

  # ── LLM Serving proxy (RAG + cache + SSE) — B2 ───────────────
  llm_serving:
    build:
      context: ./services/llm_serving
      dockerfile: Dockerfile
    container_name: llm_serving
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      GRAPH_RAG_URL: http://graph_rag:8004
      REDIS_URL: redis://redis:6379
      GENERATOR_URL: ${GENERATOR_URL:-http://sglang:8081/v1}
      SESSION_TTL: "3600"
    depends_on:
      graph_rag:
        condition: service_healthy
      redis:
        condition: service_healthy
      sglang:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  redis_data:
  model_cache: